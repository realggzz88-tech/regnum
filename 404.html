<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>404 - Страната не е пронајдена | Regnum Consulting</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #14181D;
            color: #F2F2F2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .error-container {
            max-width: 500px;
        }
        .error-code {
            font-family: 'Sora', sans-serif;
            font-size: 8rem;
            font-weight: 700;
            color: #C7E35F;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-title {
            font-family: 'Sora', sans-serif;
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .error-message {
            color: #9CA3AF;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .error-btn {
            display: inline-block;
            padding: 14px 32px;
            background-color: #C7E35F;
            color: #0F1419;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 8px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .error-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(199, 227, 95, 0.3);
        }
        .error-links {
            margin-top: 2rem;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .error-links a {
            color: #C7E35F;
            text-decoration: none;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }
        .error-links a:hover {
            opacity: 0.8;
        }
        .logo {
            position: absolute;
            top: 30px;
            left: 30px;
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: #F2F2F2;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <a href="index.html" class="logo">REGNUM</a>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Страната не е пронајдена</h1>
        <p class="error-message">
            Страната што ја барате не постои или е преместена. 
            Проверете ја URL адресата или вратете се на почетната страница.
        </p>
        <a href="index.html" class="error-btn">Врати се на почеток</a>
        <div class="error-links">
            <a href="websites.html">Веб-страни</a>
            <a href="crm-systems.html">CRM Системи</a>
            <a href="automation.html">Автоматизација</a>
            <a href="index.html#kontakt">Контакт</a>
        </div>
    </div>
</body>
</html>
